name: k_urja
description: "Survey App for Ktu Energycell"
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.10.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.5
  path: ^1.8.3

  # Sign-in with Apple (use v7 which supports new Android embedding)
  sign_in_with_apple: ^7.0.1

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any # Or any recent version

  # UI / routing
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  provider: ^6.0.0

  # Supabase + .env loader
  supabase_flutter: ^2.10.3
  flutter_dotenv: ^6.0.0

  # Optional helpful packages (you can remove any you don't want)
  collection: ^1.17.0
  pie_chart: ^5.3.2
  http: ^1.1.0
  flutter_markdown: ^0.6.18
  connectivity_plus: ^7.0.0
  workmanager: ^0.9.0+3
  pdf: ^3.11.3
  printing: ^5.14.2
  permission_handler: ^12.0.1
  google_fonts: ^6.3.3
  uuid: ^4.5.2
  shared_preferences: ^2.5.3
  file_saver: ^0.3.1
  flutter_file_dialog: ^3.0.3
  markdown: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/.env.example
    - assets/images/unified.png
    - assets/images/iedc.png
